<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nodeblast</title>
  <meta name="description" content="A launchpad for creators. Share your projects, discover what others are building." />
  <meta property="og:title" content="nodeblast" />
  <meta property="og:description" content="A launchpad for creators. Share your projects, discover what others are building." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nodeblast.dev" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="nodeblast" />
  <meta name="twitter:description" content="A launchpad for creators." />
  <link rel="canonical" href="https://nodeblast.dev" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Hex clip-path (path generated in hex-grid.js) -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="hex-clip" clipPathUnits="objectBoundingBox">
        <path id="hex-clip-path" d="" />
      </clipPath>
    </defs>
  </svg>

  <!-- ══════════════════════════════════════
       HEADER
       ══════════════════════════════════════ -->
  <div id="hdr">
    <div id="hdr-left">
      <div id="hdr-logo" data-tip="Home">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,3 97,28 97,72 50,97 3,72 3,28" fill="currentColor"/>
        </svg>
      </div>
      <div id="hdr-brand">nodeblast</div>
      <div id="hdr-tag">create. share. detonate.</div>
    </div>
    <div id="hdr-mid">
      <div id="search-wrap">
        <button class="icon-btn" id="search-btn" data-tip="Search ( / )">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div id="search-input-shell">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search users or catalysts..." spellcheck="false" autocomplete="off" />
          <button id="search-close" data-tip="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="search-dropdown"></div>
      </div>
    </div>
    <div id="hdr-right">
      <button class="icon-btn" data-action="theme" data-tip="Toggle theme">
        <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="hdr-sep"></div>
      <button id="acct-btn" data-tip="Account">
        <div id="acct-avatar-sm"></div>
        <span id="acct-name-short">Alchemist</span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CATEGORY FILTER BAR (feed route)
       ══════════════════════════════════════ -->
  <div id="cat-filter-bar">
    <button class="cat-filter-pill selected" data-cat="all">All</button>
    <button class="cat-filter-pill" data-cat="games">Games</button>
    <button class="cat-filter-pill" data-cat="tools">Tools</button>
    <button class="cat-filter-pill" data-cat="creative">Creative</button>
    <button class="cat-filter-pill" data-cat="ai">AI</button>
    <button class="cat-filter-pill" data-cat="sites">Sites</button>
    <button class="cat-filter-pill" data-cat="wild">Wild</button>
  </div>

  <!-- ══════════════════════════════════════
       PROFILE HEADER BAR (profile route)
       ══════════════════════════════════════ -->
  <div id="profile-bar">
    <div id="profile-bar-left">
      <div id="profile-bar-avatar"></div>
      <div id="profile-bar-info">
        <div id="profile-bar-name"></div>
        <div id="profile-bar-hex-row">
          <div id="profile-bar-hex-dot"></div>
          <span id="profile-bar-hex-label"></span>
        </div>
      </div>
    </div>
    <div id="profile-bar-right">
      <span id="profile-bar-count"></span>
      <button id="profile-bar-share" class="cat-btn" style="display:none" data-tip="Copy profile link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share
      </button>
      <button id="profile-bar-action" class="cat-btn"></button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       HEX GRID
       ══════════════════════════════════════ -->
  <div id="grid">
    <div id="honeycomb"></div>
  </div>

  <!-- ══════════════════════════════════════
       404
       ══════════════════════════════════════ -->
  <div id="not-found">
    <div id="not-found-card">
      <div id="not-found-code">404</div>
      <div id="not-found-title">not found</div>
      <div id="not-found-sub">This page doesn't exist or was removed.</div>
      <button id="not-found-home" class="cat-btn primary">Go home</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       ACCOUNT MENU (DexNote structure, NodeBlast content)
       ══════════════════════════════════════ -->
  <div id="acct-menu">
    <button id="acct-menu-close" data-tip="Close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div id="acct-menu-scroll">
      <!-- PROFILE HEADER -->
      <div id="acct-profile-hdr">
        <div id="acct-avatar-wrap">
          <div id="acct-avatar"></div>
          <button id="acct-avatar-upload-btn" data-tip="Change photo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4" fill="currentColor"/>
            </svg>
          </button>
          <input type="file" id="acct-avatar-file" accept="image/*" style="display:none" />
        </div>
        <div id="acct-profile-info">
          <div id="acct-username-row">
            <span id="acct-name" class="acct-username-display"></span>
            <button id="acct-edit-btn" data-tip="Edit profile">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            </button>
          </div>
          <div id="acct-hex-row">
            <div id="acct-hex-dot"></div>
            <span id="acct-hex-label"></span>
            <button id="acct-hex-copy-btn" data-tip="Copy username#hexcode">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
          <a href="#" id="acct-view-profile" class="acct-view-profile-link">View my profile →</a>
        </div>
      </div>

      <!-- EDIT PANEL -->
      <div id="acct-edit-panel">
        <div class="acct-edit-field">
          <label class="acct-edit-label" for="acct-username-input">User:</label>
          <input id="acct-username-input" type="text" maxlength="16" placeholder="Name" autocomplete="off" spellcheck="false" />
        </div>
        <div class="acct-edit-field acct-edit-hex-row">
          <label class="acct-edit-label">Hex:</label>
          <div id="acct-edit-color-pick">
            <button id="acct-edit-color-btn" data-tip="Pick color"><span id="acct-edit-color-preview"></span></button>
            <input type="text" id="acct-edit-hex-input" spellcheck="false" maxlength="7" autocomplete="off" />
          </div>
          <div id="acct-status-toggle">
            <button class="status-btn selected" data-status="online" data-tip="Appear online"><span class="status-dot-icon"></span>On</button>
            <button class="status-btn" data-status="offline" data-tip="Appear offline"><span class="status-dot-icon offline"></span>Off</button>
          </div>
        </div>
        <div id="acct-edit-actions">
          <button id="acct-edit-cancel-btn">Cancel</button>
          <button id="acct-edit-save-btn">Save</button>
        </div>
      </div>

      <!-- CATALYSTS DROPDOWN -->
      <div class="acct-dropdown-section" id="acct-catalysts-section">
        <button class="acct-dropdown-toggle" id="acct-catalysts-toggle">
          <span class="acct-drop-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/>
              <circle cx="12" cy="12" r="3" fill="currentColor"/>
            </svg>
          </span>
          Catalysts
          <span id="acct-catalysts-count">0</span>
        </button>
        <div class="acct-dropdown-body">
          <div id="acct-catalysts-list">No catalysts yet</div>
        </div>
      </div>

      <!-- PEOPLE DROPDOWN -->
      <div class="acct-dropdown-section" id="acct-friends-section">
        <button class="acct-dropdown-toggle" id="acct-friends-toggle">
          <span class="acct-drop-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="7" r="3.5"/>
              <path d="M2 21c0-3.5 3-6.5 7-6.5s7 3 7 6.5"/>
              <circle cx="17" cy="8" r="2.5"/>
              <path d="M22 21c0-2.8-2-5-5-5-1 0-1.8.2-2.5.6"/>
            </svg>
          </span>
          People
          <span id="acct-friends-count">0</span>
        </button>
        <div class="acct-dropdown-body">
          <div id="acct-friends-add-row">
            <div style="flex:1;min-width:0">
              <input type="text" id="acct-friends-add-input" placeholder="username#hexcode" spellcheck="false" autocomplete="off" />
            </div>
            <button id="acct-friends-add-btn">Add</button>
          </div>
          <div id="acct-friends-list"></div>
        </div>
      </div>
    </div><!-- /acct-menu-scroll -->

    <!-- SETTINGS VIEW -->
    <div id="acct-settings-view">
      <div id="settings-view-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </div>
      <div id="settings-scroll">
        <div class="settings-section">
          <div class="settings-section-title">Audio</div>
          <div class="settings-audio-row">
            <div class="settings-audio-info"><div class="settings-row-label">Master</div></div>
            <div class="settings-slider-wrap">
              <input type="range" class="settings-slider" id="master-volume" min="0" max="100" value="50"/>
              <span class="settings-slider-val" id="master-volume-val">50%</span>
            </div>
            <label class="settings-switch" id="master-mute-toggle"><input type="checkbox" checked><span class="settings-switch-track"><span class="settings-switch-thumb"></span></span></label>
          </div>
          <div class="settings-audio-row">
            <div class="settings-audio-info"><div class="settings-row-label">Music</div></div>
            <div class="settings-slider-wrap">
              <input type="range" class="settings-slider" id="music-volume" min="0" max="100" value="50"/>
              <span class="settings-slider-val" id="music-volume-val">50%</span>
            </div>
            <label class="settings-switch" id="music-mute-toggle"><input type="checkbox" checked><span class="settings-switch-track"><span class="settings-switch-thumb"></span></span></label>
          </div>
          <div class="settings-audio-row">
            <div class="settings-audio-info"><div class="settings-row-label">FX</div></div>
            <div class="settings-slider-wrap">
              <input type="range" class="settings-slider" id="fx-volume" min="0" max="100" value="50"/>
              <span class="settings-slider-val" id="fx-volume-val">50%</span>
            </div>
            <label class="settings-switch" id="fx-mute-toggle"><input type="checkbox" checked><span class="settings-switch-track"><span class="settings-switch-thumb"></span></span></label>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-section-title">Display</div>
          <div class="settings-palette-row">
            <div class="settings-row-label">Palette</div>
            <div class="settings-palette-group">
              <button class="settings-palette-btn" data-palette="ocean" data-tip="Ocean"><div class="settings-palette-strip"><span style="background:#127596"></span><span style="background:#2e6d9e"></span><span style="background:#0c4d63"></span></div></button>
              <button class="settings-palette-btn" data-palette="ember" data-tip="Ember"><div class="settings-palette-strip"><span style="background:#9c4060"></span><span style="background:#c85c2e"></span><span style="background:#6b2838"></span></div></button>
              <button class="settings-palette-btn selected" data-palette="bold" data-tip="Bold"><div class="settings-palette-strip"><span style="background:#5AAA72"></span><span style="background:#72e122"></span><span style="background:#397212"></span></div></button>
              <button class="settings-palette-btn" data-palette="soft" data-tip="Soft"><div class="settings-palette-strip"><span style="background:#825FC2"></span><span style="background:#a385d4"></span><span style="background:#5f468f"></span></div></button>
            </div>
          </div>
        </div>
      </div>
      <div id="settings-view-footer">
        <button class="acct-menu-item" id="settings-back-btn">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,3 5,8 10,13"/></svg>
          Back
        </button>
        <button class="acct-menu-item danger" id="settings-signout-btn">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>

    <!-- FOOTER (signed-in) -->
    <div id="acct-footer">
      <button class="acct-menu-item" id="acct-settings-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
      <button class="acct-menu-item danger" id="acct-signout-btn">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>

    <!-- FOOTER (guest — sign-in buttons) -->
    <div id="acct-signin-footer">
      <div id="acct-signin-title">Sign in to save your work</div>
      <button id="google-signin-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <button id="github-signin-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        Continue with GitHub
      </button>
      <div id="auth-error"></div>
    </div>
  </div><!-- /acct-menu -->

  <!-- ══════════════════════════════════════
       COLOR PICKER POPUP (verbatim from DexNote)
       ══════════════════════════════════════ -->
  <div id="clr-popup">
    <div id="clr-popup-hdr">
      <span id="clr-popup-title">Color</span>
      <button id="clr-popup-close">×</button>
    </div>
    <div id="clr-box-wrap">
      <canvas id="clr-box-canvas" width="222" height="140" style="display:block;width:100%;height:100%;border-radius:7px;cursor:crosshair"></canvas>
      <div id="clr-cursor"></div>
    </div>
    <div class="clr-slider-row"><span class="clr-slider-label">H</span><input type="range" class="clr-slider" id="slider-h" min="0" max="360" value="140"></div>
    <div class="clr-slider-row"><span class="clr-slider-label">S</span><input type="range" class="clr-slider" id="slider-s" min="0" max="100" value="47"></div>
    <div class="clr-slider-row"><span class="clr-slider-label">B</span><input type="range" class="clr-slider" id="slider-b" min="0" max="100" value="67"></div>
    <div id="clr-hex-row">
      <div id="clr-hex-field">
        <span id="clr-hex-hash">#</span>
        <input id="clr-hex-in" type="text" maxlength="7" placeholder="5AAA72" spellcheck="false" autocomplete="off">
        <button class="clr-hex-icon" id="clr-hex-copy" data-tip="Copy hex code">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div id="clr-swatch"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CATALYST MODAL (create/edit)
       ══════════════════════════════════════ -->
  <div id="cat-modal">
    <div id="cat-modal-card">
      <button id="cat-modal-close" data-tip="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="cat-modal-title">New Catalyst</div>

      <div class="cat-field">
        <label class="cat-label">Title</label>
        <input id="cat-title" type="text" maxlength="40" placeholder="Project name" spellcheck="false" autocomplete="off" />
      </div>

      <div class="cat-field">
        <label class="cat-label">URL</label>
        <input id="cat-url" type="text" placeholder="https://..." spellcheck="false" autocomplete="off" />
        <div id="cat-url-error" class="cat-field-error"></div>
      </div>

      <div class="cat-field">
        <label class="cat-label">Description</label>
        <textarea id="cat-desc" maxlength="500" rows="3" placeholder="What does it do?"></textarea>
      </div>

      <div class="cat-field">
        <label class="cat-label">Category</label>
        <div class="cat-pills" id="cat-category-pills">
          <button class="cat-pill" data-val="games">Games</button>
          <button class="cat-pill" data-val="tools">Tools</button>
          <button class="cat-pill" data-val="creative">Creative</button>
          <button class="cat-pill" data-val="ai">AI</button>
          <button class="cat-pill selected" data-val="sites">Sites</button>
          <button class="cat-pill" data-val="wild">Wild</button>
        </div>
      </div>

      <div class="cat-field">
        <label class="cat-label">Platform</label>
        <div class="cat-pills" id="cat-platform-pills">
          <button class="cat-pill selected" data-val="web">Web</button>
          <button class="cat-pill" data-val="mobile">Mobile</button>
          <button class="cat-pill" data-val="both">Both</button>
        </div>
      </div>

      <div class="cat-field cat-field-row">
        <div class="cat-field-col" style="flex:1">
          <label class="cat-label">Thumbnail</label>
          <div id="cat-thumb-drop">
            <div class="cat-thumb-hint">Drop image or click to upload</div>
          </div>
          <input type="file" id="cat-thumb-file" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none" />
        </div>
        <div class="cat-field-col" style="flex:0 0 auto">
          <label class="cat-label">Accent</label>
          <button id="cat-accent-btn" data-tip="Pick accent color">
            <span id="cat-accent-preview"></span>
          </button>
        </div>
      </div>

      <div id="cat-modal-btns">
        <button id="cat-delete-btn" class="cat-btn danger">Delete</button>
        <div style="flex:1"></div>
        <button id="cat-cancel-btn" class="cat-btn">Cancel</button>
        <button id="cat-submit-btn" class="cat-btn primary">Create Catalyst</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CATALYST DETAIL POPUP
       ══════════════════════════════════════ -->
  <div id="cat-detail-popup">
    <div id="cat-detail-card">
      <button id="cat-detail-close" data-tip="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="cat-detail-thumb"></div>
      <div id="cat-detail-body">
        <div id="cat-detail-title"></div>
        <div id="cat-detail-creator"></div>
        <div id="cat-detail-badges">
          <span class="cat-detail-badge" id="cat-detail-category"></span>
          <span class="cat-detail-badge" id="cat-detail-platform"></span>
        </div>
        <div id="cat-detail-desc"></div>
        <button id="cat-detail-open" class="cat-btn primary">
          Open Project
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <div id="cat-detail-vote">
          <button id="cat-vote-fire" class="vote-btn" data-tip="Fire!">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg>
            <span class="vote-count">0</span>
          </button>
          <button id="cat-vote-frost" class="vote-btn" data-tip="Frost">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 11h-4.17l3.24-3.24-1.41-1.42L15 11h-2V9l4.66-4.66-1.42-1.41L13 6.17V2h-2v4.17L7.76 2.93 6.34 4.34 11 9v2H9L4.34 6.34 2.93 7.76 6.17 11H2v2h4.17l-3.24 3.24 1.41 1.42L9 13h2v2l-4.66 4.66 1.42 1.41L11 17.83V22h2v-4.17l3.24 3.24 1.42-1.41L13 15v-2h2l4.66 4.66 1.41-1.42L17.83 13H22v-2z"/></svg>
            <span class="vote-count">0</span>
          </button>
        </div>
        <div id="cat-detail-views">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="cat-detail-view-count">0</span>
          <span id="cat-detail-view-label">views</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MODAL / TOAST / TOOLTIP
       ══════════════════════════════════════ -->
  <div id="dex-modal">
    <div id="dex-modal-card">
      <div id="dex-modal-title"></div>
      <div id="dex-modal-msg"></div>
      <div id="dex-modal-sub"></div>
      <div id="dex-modal-btns">
        <button id="dex-modal-cancel" class="dex-modal-btn cancel">Cancel</button>
        <button id="dex-modal-confirm" class="dex-modal-btn primary">Confirm</button>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <div id="dex-tip"></div>

  <script type="module" src="js/init.js"></script>
</body>
</html>
