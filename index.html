<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NodeBlast — create. share. detonate.</title>
  <meta name="description" content="NodeBlast is a creator portfolio platform. Showcase your projects as hexagonal tiles." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Hex clip-path definition (path is generated in hex-grid.js) -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <clipPath id="hex-clip" clipPathUnits="objectBoundingBox">
        <path id="hex-clip-path" d="" />
      </clipPath>
    </defs>
  </svg>

  <div id="hdr">
    <div id="hdr-left">
      <div id="hdr-brand">nodeblast</div>
      <div id="hdr-tag">create. share. detonate.</div>
    </div>
    <div id="hdr-right">
      <button class="tbtn" id="theme-btn" title="Toggle theme">
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button id="signin-btn">Sign in</button>
      <div id="profile-pill" style="display:none">
        <img id="pill-img" alt="" />
        <span id="pill-name"></span>
      </div>
    </div>
  </div>

  <div id="grid">
    <div id="honeycomb"></div>
  </div>

  <script type="module" src="js/init.js"></script>
</body>
</html>
